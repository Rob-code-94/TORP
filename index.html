<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TORP | Cinematic Partners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Phosphate', 'Bebas Neue', 'Impact', 'sans-serif'],
              display: ['Phosphate', 'Bebas Neue', 'Impact', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
            },
            letterSpacing: {
                tighter: '-0.05em',
                tight: '-0.025em',
                normal: '0',
                wide: '0.05em',
                wider: '0.1em',
                widest: '0.25em',
            }
          },
        },
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;800;900&display=swap');
      
      :root {
        --font-display: 'Phosphate', 'Bebas Neue', 'Impact', sans-serif;
        --font-body: 'Inter', sans-serif;
      }

      body {
        font-family: var(--font-display);
        background-color: #09090b; /* zinc-950 */
        color: #e4e4e7; /* zinc-200 */
        overflow-x: hidden;
        /* Default to uppercase for the cinematic feel */
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* Exception: Form inputs, paragraphs, and small utility text should be legible standard case */
      p, input, textarea, select, .lowercase-override, td, th, .text-xs, .text-sm, .font-mono {
        font-family: var(--font-body);
        text-transform: none;
        letter-spacing: 0;
      }
      
      /* Re-enforce display font for headings to be safe */
      h1, h2, h3, h4, h5, h6, button, .font-display {
        font-family: var(--font-display);
        text-transform: uppercase;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }

      /* Google Places `.pac-container` is appended to body; keep above HQ drawers (z-50) without widening the page */
      .pac-container {
        z-index: 10060 !important;
        font-family: var(--font-body);
        text-transform: none;
        letter-spacing: 0;
        background-color: #18181b;
        border: 1px solid #3f3f46;
      }
      .pac-item {
        color: #e4e4e7;
        border-top: 1px solid #27272a;
      }
      .pac-item-query {
        color: #fafafa;
      }
      .pac-item:hover,
      .pac-item-selected {
        background-color: #27272a;
      }
    </style>
  <script type="importmap">

  }
}
</script>
