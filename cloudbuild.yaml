substitutions:
  _REGION: us-west1
  _SERVICE: torp-cinematic-production-management
  # Must match where Cloud Build / Cloud Run push images (see a successful build log).
  # Typical for “Connect repo → Cloud Run” flows: repo `cloud-run-source-deploy`, image path below.
  _AR_REPO: cloud-run-source-deploy
  _IMAGE_NAME: torp/torp-cinematic-production-management

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      # NOTE: `$SHORT_SHA` is often empty for `gcloud builds submit` from a local directory.
      # `$BUILD_ID` is always populated by Cloud Build and works well as an immutable tag.
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_IMAGE_NAME:$BUILD_ID"
      - "."

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_IMAGE_NAME:$BUILD_ID"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "$_SERVICE"
      - "--project=$PROJECT_ID"
      - "--region=$_REGION"
      - "--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_IMAGE_NAME:$BUILD_ID"
      - "--port=8080"
      - "--ingress=all"
      - "--allow-unauthenticated"
      - "--clear-volumes"
      - "--clear-volume-mounts"

images:
  - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_IMAGE_NAME:$BUILD_ID"

options:
  logging: CLOUD_LOGGING_ONLY
