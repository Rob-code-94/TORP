substitutions:
  _REGION: us-west1
  _SERVICE: torp-cinematic-production-management
  # Artifact Registry repo + image name (create the repo once in GCP)
  _AR_REPO: torp
  _IMAGE_NAME: torp-web

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_IMAGE_NAME:$SHORT_SHA"
      - "."

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_IMAGE_NAME:$SHORT_SHA"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "$_SERVICE"
      - "--project=$PROJECT_ID"
      - "--region=$_REGION"
      - "--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_IMAGE_NAME:$SHORT_SHA"
      - "--port=8080"
      - "--ingress=all"
      - "--allow-unauthenticated"

images:
  - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_IMAGE_NAME:$SHORT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
